name: scanswift
description: "A professional QR and Barcode Scanner & Generator App."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Core Engines
  mobile_scanner: ^5.0.0
  qr_flutter: ^4.1.0
  
  # Storage & Utilities
  hive_flutter: ^1.1.0
  share_plus: ^7.2.1
  url_launcher: ^6.3.0
  intl: ^0.19.0
  
  # Monetization
  google_mobile_ads: ^5.1.0

  barcode_widget: ^2.0.4
  path_provider: ^2.1.3

  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true