name: scanswift
description: "A professional QR and Barcode Scanner & Generator App."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  
  # Core Engines
  mobile_scanner: ^5.0.0
  qr_flutter: ^4.1.0
  
  # Storage & Utilities
  hive_flutter: ^1.1.0
  share_plus: ^7.2.1
  url_launcher: ^6.3.0
  intl: ^0.19.0
  
  # Monetization
  google_mobile_ads: ^5.1.0

  barcode_widget: ^2.0.4
  path_provider: ^2.1.3

  pdf: ^3.11.1
  printing: ^5.13.2

  audioplayers: ^5.2.1
  vibration: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1 # বা লেটেস্ট ভার্সন

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21 # আপনার প্রজেক্টের minSdk অনুযায়ী

flutter:
  uses-material-design: true

  assets:
    - assets/images/app_logo.png
